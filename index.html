<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanças Igreja">
<meta name="theme-color" content="#1F4734">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Finanças da Igreja</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F1E8;
  --paper:#FFFFFF;
  --ink:#2B2A26;
  --ink-soft:#7A746A;
  --primary:#1F4734;
  --primary-light:#3A6B53;
  --accent:#C28E2C;
  --entrada:#2F7D5C;
  --saida:#A6432F;
  --line:#E4DECB;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);}
body{-webkit-tap-highlight-color:transparent;}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}

header.topbar{background:var(--primary);color:#fff;padding:18px 16px 6px;position:sticky;top:0;z-index:10;}
header.topbar h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:1.35rem;letter-spacing:.01em;}
header.topbar .sub{font-size:.7rem;opacity:.7;margin-top:2px;text-transform:uppercase;letter-spacing:.14em;}

.balances{display:flex;flex-direction:column;gap:6px;padding:10px 16px 6px;}
.balance-row{display:flex;gap:6px;}
.balance-card{flex:1;min-width:0;background:var(--paper);border-radius:var(--radius);padding:7px 10px;border:1px solid var(--line);}
.balance-card .label{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);}
.balance-card .value{font-family:'Fraunces',Georgia,serif;font-size:.92rem;font-weight:600;margin-top:1px;}
.balance-card.total{background:var(--primary);color:#fff;border-color:var(--primary);padding:9px 12px;}
.balance-card.total .label{color:rgba(255,255,255,.7);}
.balance-card.total .value{font-size:1.25rem;}
.balance-card .value.neg{color:var(--saida);}
.balance-card.total .value.neg{color:#ffd0c2;}

main{flex:1;padding:12px 16px 96px;}
nav.bottomnav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--paper);border-top:1px solid var(--line);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom);}
nav.bottomnav button{flex:1;background:none;border:none;padding:8px 2px 7px;font-size:.56rem;color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;cursor:pointer;line-height:1.1;text-align:center;}
nav.bottomnav button.active{color:var(--primary);font-weight:700;}
nav.bottomnav .icon{font-size:1.25rem;}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.card.compact{padding:10px 12px;margin-bottom:8px;}
h2.section-title{font-family:'Fraunces',Georgia,serif;font-size:1.05rem;margin-bottom:10px;color:var(--primary);}
.card.compact h2.section-title{font-size:.85rem;margin-bottom:6px;letter-spacing:.02em;}
h2.section-title small{display:block;font-family:'Inter',sans-serif;font-size:.65rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.12em;font-weight:600;margin-top:2px;}

label{display:block;font-size:.7rem;color:var(--ink-soft);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;}
.compact-form label{margin:6px 0 3px;font-size:.62rem;}
.compact-form input,.compact-form select{padding:7px 10px;font-size:.88rem;}
.compact-form .btn-row{margin-top:8px;}
.compact-form .btn{padding:9px;font-size:.85rem;}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:1rem;background:#fff;font-family:inherit;color:var(--ink);}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);border-color:var(--accent);}

.segmented{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:4px;}
.segmented button{flex:1;padding:10px 4px;border:none;background:#fff;font-family:inherit;font-size:.82rem;font-weight:700;color:var(--ink-soft);cursor:pointer;border-right:1px solid var(--line);}
.segmented button:last-child{border-right:none;}
.segmented button.active{background:var(--primary);color:#fff;}

.btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:.95rem;font-weight:700;font-family:inherit;margin-top:14px;cursor:pointer;text-align:center;}
.btn.secondary{background:transparent;color:var(--primary);border:1px solid var(--primary);}
.btn.danger{background:var(--saida);}
.btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
.btn.small{padding:8px 10px;font-size:.78rem;margin-top:0;width:auto;display:inline-block;}
.btn-row{display:flex;gap:8px;margin-top:14px;}
.btn-row .btn{margin-top:0;flex:1;}

.lancamento-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);gap:10px;cursor:pointer;}
.lancamento-item:last-child{border-bottom:none;}
.lancamento-item .info{flex:1;min-width:0;}
.lancamento-item .hist{font-weight:600;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lancamento-item .meta{font-size:.66rem;color:var(--ink-soft);margin-top:1px;}
.lancamento-item .meta.saida{color:var(--saida);font-weight:600;}
.lancamento-item .valor{font-family:'Fraunces',Georgia,serif;font-weight:700;font-size:.88rem;white-space:nowrap;}
.valor.entrada{color:var(--entrada);}
.valor.saida{color:var(--saida);}

.empty{text-align:center;color:var(--ink-soft);padding:30px 10px;font-size:.88rem;line-height:1.5;}

.modal-overlay{position:fixed;inset:0;background:rgba(43,42,38,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
.modal{background:var(--paper);width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:18px 16px 28px;max-height:88vh;overflow-y:auto;}
.modal h3{font-family:'Fraunces',Georgia,serif;color:var(--primary);margin-bottom:4px;font-size:1.1rem;}
.modal .note{font-size:.75rem;color:var(--ink-soft);margin-top:8px;line-height:1.4;}

/* Splash de notificação — tela cheia centrada */
.splash-overlay{position:fixed;inset:0;background:rgba(10,10,8,.65);display:flex;align-items:center;justify-content:center;z-index:80;padding:16px;}
.splash{background:var(--paper);width:100%;max-width:460px;border-radius:18px;overflow:hidden;max-height:90vh;display:flex;flex-direction:column;}
.splash-header{background:var(--primary);color:#fff;padding:18px 18px 14px;}
.splash-header h2{font-family:'Fraunces',Georgia,serif;font-size:1.2rem;margin-bottom:2px;}
.splash-header p{font-size:.78rem;opacity:.8;}
.splash-body{flex:1;overflow-y:auto;padding:12px 14px;}
.splash-footer{padding:10px 14px 14px;border-top:1px solid var(--line);}
.splash-section-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;color:var(--ink-soft);margin:10px 0 4px;}
.splash-section-label:first-child{margin-top:0;}
.splash-item{display:flex;justify-content:space-between;align-items:center;padding:9px 10px;border-radius:10px;margin-bottom:4px;cursor:pointer;gap:10px;transition:background .15s;}
.splash-item:hover,.splash-item:active{background:var(--line);}
.splash-item.atrasado{background:rgba(166,67,47,.08);}
.splash-item.hoje{background:rgba(194,142,44,.1);}
.splash-item.embreve{background:rgba(31,71,52,.07);}
.splash-item .si-desc{font-size:.88rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.splash-item .si-meta{font-size:.68rem;color:var(--ink-soft);margin-top:1px;}
.splash-item .si-valor{font-family:'Fraunces',Georgia,serif;font-weight:700;font-size:.92rem;white-space:nowrap;color:var(--saida);}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:.85rem;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

table.report{width:100%;border-collapse:collapse;font-size:.78rem;}
table.report th,table.report td{padding:6px 4px;border-bottom:1px solid var(--line);text-align:left;}
table.report th{font-size:.62rem;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.04em;}
table.report td.num,table.report th.num{text-align:right;font-family:'Fraunces',Georgia,serif;}
table.report tr.total-row td{font-weight:700;border-top:2px solid var(--ink);border-bottom:none;}
table.report tr.saldo-row td{font-weight:700;background:#FBF8F0;}
.table-wrap{overflow-x:auto;}

.filters-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 10px;}

.category-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:8px;}
.category-row:last-child{border-bottom:none;}
.category-row .name{flex:1;font-size:.9rem;font-weight:500;}
.tag{font-size:.62rem;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;white-space:nowrap;}
.tag.entrada{background:rgba(47,125,92,.13);color:var(--entrada);}
.tag.saida{background:rgba(166,67,47,.13);color:var(--saida);}
.tag.ambos{background:rgba(194,142,44,.16);color:var(--accent);}

.icon-btn{background:none;border:none;font-size:1rem;color:var(--ink-soft);cursor:pointer;padding:4px;}

.summary-row{display:flex;justify-content:space-between;font-size:.85rem;padding:4px 0;}
.summary-row.bold{font-weight:700;border-top:1px solid var(--line);margin-top:6px;padding-top:8px;}

/* ===== Versão para telas maiores (PC/tablet) - mesma estrutura, só redimensionada ===== */
@media (min-width:860px){
  #app{max-width:760px;box-shadow:0 0 0 1px var(--line);}
  header.topbar{border-radius:0;}
  .balances{flex-direction:row;}
  .balance-row{display:contents;}
  .balance-card.total{flex:1.4;}
  .balance-card.total .value{font-size:1.7rem;}
  main{padding:16px 24px 96px;}
  table.report{font-size:.85rem;}
}

.print-only{display:none;}
.letterhead{display:flex;gap:14px;align-items:center;margin-bottom:14px;}
.letterhead img{width:64px;height:64px;object-fit:contain;}
.letterhead .igreja-nome{font-family:'Fraunces',Georgia,serif;font-weight:700;font-size:1.05rem;}
.letterhead .igreja-info{font-size:.75rem;color:var(--ink-soft);line-height:1.4;}
.assinaturas{display:flex;gap:24px;margin-top:36px;}
.assinatura{flex:1;text-align:center;font-size:.78rem;}
.assinatura .linha{border-top:1px solid var(--ink);margin-bottom:6px;padding-top:4px;}

@media print{
  nav.bottomnav,header.topbar,.no-print{display:none!important;}
  body,#app{background:#fff;max-width:none;}
  main{padding:0;}
  .card{border:none;padding:0;}
  .print-only{display:block;}
}
</style>
</head>

</div>
<div id="modalRoot"></div>
<div id="splashRoot"></div>

/* ============================================================
   UTILITÁRIOS
============================================================ */
function todayISO(){
  const d = new Date();
  const tz = d.getTimezoneOffset()*60000;
  return new Date(d - tz).toISOString().slice(0,10);
}
function firstDayOfMonthISO(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
function nomeMesAno(iso){
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const [y,m] = iso.split('-');
  return `${meses[parseInt(m,10)-1]} de ${y}`;
}
function addDaysISO(iso, n){
  const d = new Date(iso+'T00:00:00');
  d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addMonthsISO(iso, n){
  const [y,m,d] = iso.split('-').map(Number);
  const ref = new Date(y, (m-1)+n, 1);
  const lastDay = new Date(ref.getFullYear(), ref.getMonth()+1, 0).getDate();
  const day = Math.min(d, lastDay);
  return `${ref.getFullYear()}-${String(ref.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}
function formatMoeda(v){
  return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function formatMoedaPDF(v){
  return formatMoeda(v).replace(/\u00A0/g,' ');
}
function formatDataBR(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function parseValor(str){
  str = String(str||'').trim();
  if(str === '') return 0;
  if(str.includes(',')){
    str = str.replace(/\./g,'').replace(',', '.');
  }
  const v = parseFloat(str);
  return isNaN(v) ? 0 : v;
}
function escHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
}
function downloadFile(content, filename, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function csvNum(v){
  return (v||0).toFixed(2).replace('.', ',');
}
function toCSV(rows){
  const BOM = '\uFEFF';
  return BOM + rows.map(r=>r.map(c=>{
    c = (c===null||c===undefined)?'':String(c);
    if(c.includes(';')||c.includes('"')||c.includes('\n')){
      c = '"'+c.replace(/"/g,'""')+'"';
    }
    return c;
  }).join(';')).join('\r\n');
}

   BANCO DE DADOS (Supabase - mesmo projeto do VanessaDoces,
   tabelas próprias prefixadas com "igreja_")
============================================================ */
const TABLES = { lancamentos:'igreja_lancamentos', categorias:'igreja_categorias', config:'igreja_config', compromissos:'igreja_compromissos', parcelas:'igreja_parcelas' };
const PK = { lancamentos:'id', categorias:'id', config:'key', compromissos:'id', parcelas:'id' };

function toRow(storeName, obj){
  if(storeName === 'lancamentos'){
    const row = {
      data: obj.data,
      historico: obj.historico,
      categoria: obj.categoria,
      conta: obj.conta,
      tipo: obj.tipo,
      valor: obj.valor,
      transfer_group: obj.transferGroup ?? null
    };
    if(obj.id !== undefined) row.id = obj.id;
    return row;
  }
  if(storeName === 'categorias'){
    const row = { nome: obj.nome, tipo: obj.tipo };
    if(obj.id !== undefined) row.id = obj.id;
    return row;
  }
  if(storeName === 'config'){
    return { key: obj.key, saldos: obj.saldos, data_base: obj.dataBase };
  }
  if(storeName === 'compromissos'){
    const row = {
      descricao: obj.descricao,
      tipo: obj.tipo,
      categoria: obj.categoria,
      conta: obj.conta,
      valor_previsto: obj.valorPrevisto,
      valor_variavel: !!obj.valorVariavel,
      dia_vencimento: obj.diaVencimento ?? null,
      data_inicio: obj.dataInicio ?? null,
      num_parcelas: obj.numParcelas ?? null,
      ativo: obj.ativo !== undefined ? obj.ativo : true,
      observacoes: obj.observacoes ?? null
    };
    if(obj.id !== undefined) row.id = obj.id;
    return row;
  }
  if(storeName === 'parcelas'){
    const row = {
      compromisso_id: obj.compromissoId,
      numero_parcela: obj.numeroParcela ?? null,
      total_parcelas: obj.totalParcelas ?? null,
      data_vencimento: obj.dataVencimento,
      valor_previsto: obj.valorPrevisto,
      status: obj.status,
      lancamento_id: obj.lancamentoId ?? null,
      valor_pago: obj.valorPago ?? null
    };
    if(obj.id !== undefined) row.id = obj.id;
    return row;
  }
  return obj;
}
function fromRow(storeName, row){
  if(storeName === 'lancamentos'){
    return { ...row, transferGroup: row.transfer_group ?? undefined };
  }
  if(storeName === 'config'){
    return { ...row, dataBase: row.data_base };
  }
  if(storeName === 'compromissos'){
    return {
      ...row,
      valorPrevisto: Number(row.valor_previsto),
      valorVariavel: row.valor_variavel,
      diaVencimento: row.dia_vencimento,
      dataInicio: row.data_inicio,
      numParcelas: row.num_parcelas
    };
  }
  if(storeName === 'parcelas'){
    return {
      ...row,
      compromissoId: row.compromisso_id,
      numeroParcela: row.numero_parcela,
      totalParcelas: row.total_parcelas,
      dataVencimento: row.data_vencimento,
      valorPrevisto: Number(row.valor_previsto),
      lancamentoId: row.lancamento_id,
      valorPago: row.valor_pago != null ? Number(row.valor_pago) : null
    };
  }
  return row;
}

async function dbGetAll(storeName){
  const { data, error } = await sbClient.from(TABLES[storeName]).select('*');
  if(error){
    console.error(error);
    showToast('Erro ao carregar dados do Supabase. Verifique a conexão/credenciais.');
    return [];
  }
  return data.map(r=>fromRow(storeName, r));
}
async function dbAdd(storeName, obj){
  const { data, error } = await sbClient.from(TABLES[storeName]).insert(toRow(storeName, obj)).select().single();
  if(error){
    console.error(error);
    showToast('Erro ao salvar no Supabase.');
    throw error;
  }
  return data.id;
}
async function dbPut(storeName, obj){
  const { error } = await sbClient.from(TABLES[storeName]).upsert(toRow(storeName, obj), { onConflict: PK[storeName] });
  if(error){
    console.error(error);
    showToast('Erro ao atualizar no Supabase.');
    throw error;
  }
}
async function dbDelete(storeName, key){
  const { error } = await sbClient.from(TABLES[storeName]).delete().eq(PK[storeName], key);
  if(error){
    console.error(error);
    showToast('Erro ao excluir no Supabase.');
    throw error;
  }
}
async function dbClear(storeName){
  const pk = PK[storeName];
  const query = sbClient.from(TABLES[storeName]).delete();
  const { error } = pk === 'key' ? await query.gt(pk, '') : await query.gt(pk, -1);
  if(error){
    console.error(error);
    showToast('Erro ao limpar dados no Supabase.');
    throw error;
  }
}

/* ============================================================
   GERAÇÃO DE PARCELAS (compromissos)
============================================================ */
function gerarParcelasIniciais(compromisso, compromissoId){
  const parcelas = [];
  if(compromisso.tipo === 'parcelado'){
    for(let i=1;i<=compromisso.numParcelas;i++){
      parcelas.push({
        compromissoId,
        numeroParcela: i,
        totalParcelas: compromisso.numParcelas,
        dataVencimento: addMonthsISO(compromisso.dataInicio, i-1),
        valorPrevisto: compromisso.valorPrevisto,
        status: 'pendente'
      });
    }
  } else if(compromisso.tipo === 'avulso'){
    parcelas.push({
      compromissoId,
      numeroParcela: null,
      totalParcelas: null,
      dataVencimento: compromisso.dataInicio,
      valorPrevisto: compromisso.valorPrevisto,
      status: 'pendente'
    });
  } else { // recorrente - gera os próximos 12 vencimentos
    const hoje = todayISO();
    const diaHoje = Number(hoje.split('-')[2]);
    let mesBase = hoje.slice(0,7)+'-01';
    if(diaHoje > compromisso.diaVencimento) mesBase = addMonthsISO(mesBase, 1);
    for(let i=0;i<12;i++){
      const ref = addMonthsISO(mesBase, i);
      const [yy,mm] = ref.split('-');
      const lastDay = new Date(Number(yy), Number(mm), 0).getDate();
      const day = Math.min(compromisso.diaVencimento, lastDay);
      parcelas.push({
        compromissoId,
        numeroParcela: null,
        totalParcelas: null,
        dataVencimento: `${yy}-${mm}-${String(day).padStart(2,'0')}`,
        valorPrevisto: compromisso.valorPrevisto,
        status: 'pendente'
      });
    }
  }
  return parcelas;
}

// Mantém uma janela de ~12 meses de parcelas futuras para compromissos
// recorrentes ativos (gera novas conforme o tempo passa).
async function garantirParcelasFuturas(){
  const horizonte = addMonthsISO(todayISO(), 12);
  let gerouAlguma = false;
  for(const c of state.compromissos){
    if(c.tipo !== 'recorrente' || !c.ativo) continue;
    const parcelasC = state.parcelas.filter(p=>p.compromissoId===c.id);
    let maxData = parcelasC.reduce((max,p)=> p.dataVencimento>max?p.dataVencimento:max, '0000-00-00');
    if(maxData >= horizonte) continue;
    let ref = addMonthsISO(maxData.slice(0,7)+'-01', 1);
    while(ref <= horizonte){
      const [yy,mm] = ref.split('-');
      const lastDay = new Date(Number(yy), Number(mm), 0).getDate();
      const day = Math.min(c.diaVencimento, lastDay);
      await dbAdd('parcelas', {
        compromissoId: c.id,
        numeroParcela: null,
        totalParcelas: null,
        dataVencimento: `${yy}-${mm}-${String(day).padStart(2,'0')}`,
        valorPrevisto: c.valorPrevisto,
        status: 'pendente'
      });
      gerouAlguma = true;
      ref = addMonthsISO(ref, 1);
    }
  }
  if(gerouAlguma){
    state.parcelas = await dbGetAll('parcelas');
  }
}

function saldoConta(conta){
  const inicial = state.config.saldosIniciais[conta] || 0;
  let mov = 0;
  for(const l of state.lancamentos){
    if(l.conta === conta){
      mov += (l.tipo === 'entrada' ? l.valor : -l.valor);
    }
  }
  return inicial + mov;
}
function saldoTotal(){
  return CONTAS.reduce((acc,c)=>acc + saldoConta(c), 0);
}

============================================================ */
function renderPendencias(){
  const hoje = todayISO();
  const limite = addDaysISO(hoje, 7);

  const pendentes = state.parcelas
    .filter(p=>p.status==='pendente')
    .map(p=>({...p, compromisso: state.compromissos.find(c=>c.id===p.compromissoId)}))
    .filter(p=>p.compromisso)
    .sort((a,b)=> a.dataVencimento.localeCompare(b.dataVencimento) || a.id-b.id);

  const atrasados = pendentes.filter(p=>p.dataVencimento < hoje);
  const hojeItens = pendentes.filter(p=>p.dataVencimento === hoje);
  const proximos = pendentes.filter(p=>p.dataVencimento > hoje && p.dataVencimento <= limite);

  if(atrasados.length + hojeItens.length + proximos.length === 0) return '';

  let html = `<div class="card compact">
    <h2 class="section-title">Pendências
      <small>${atrasados.length} atrasada(s) · ${hojeItens.length} vence(m) hoje · ${proximos.length} nos próx. 7 dias</small>
    </h2>`;
  for(const p of atrasados) html += pendenciaItemHTML(p, 'atrasado');
  for(const p of hojeItens) html += pendenciaItemHTML(p, 'hoje');
  for(const p of proximos) html += pendenciaItemHTML(p, 'proximo');
  html += `</div>`;
  return html;
}

function pendenciaItemHTML(p, situacao){
  const c = p.compromisso;
  const labelParcela = p.numeroParcela ? ` (${p.numeroParcela}/${p.totalParcelas})` : '';
  let situLabel;
  if(situacao === 'atrasado') situLabel = `Atrasado desde ${formatDataBR(p.dataVencimento)}`;
  else if(situacao === 'hoje') situLabel = 'Vence hoje';
  else situLabel = `Vence ${formatDataBR(p.dataVencimento)}`;
  const corClasse = situacao === 'proximo' ? '' : 'saida';
  return `<div class="lancamento-item" data-action="confirmar-parcela" data-id="${p.id}">
    <div class="info">
      <div class="hist">${escHtml(c.descricao)}${labelParcela}</div>
      <div class="meta ${corClasse}">${situLabel} · ${escHtml(c.categoria)} · ${escHtml(c.conta)}</div>
    </div>
    <div class="valor saida">${formatMoeda(p.valorPrevisto)}</div>
  </div>`;
}

async function handleSalvarLancamento(form){
  const tipo = state.lancarTipo || 'entrada';
  const data = form.data.value;
  const historico = form.historico.value.trim();
  const valor = parseValor(form.valor.value);

  if(!data || !historico || valor <= 0){
    showToast('Preencha data, histórico e um valor maior que zero.');
    return;
  }

  if(tipo === 'transferencia'){
    const origem = form.contaOrigem.value;
    const destino = form.contaDestino.value;
    if(origem === destino){
      showToast('Escolha contas de origem e destino diferentes.');
      return;
    }
    const grupo = Date.now();
    await dbAdd('lancamentos', {
      data, historico, categoria: CAT_TRANSFER, conta: origem, tipo:'saida', valor, transferGroup: grupo
    });
    await dbAdd('lancamentos', {
      data, historico, categoria: CAT_TRANSFER, conta: destino, tipo:'entrada', valor, transferGroup: grupo
    });
    showToast('Transferência registrada.');
  } else {
    const categoria = form.categoria.value;
    const conta = form.conta.value;
    if(!categoria){
      showToast('Cadastre uma categoria antes de lançar.');
      return;
    }
    await dbAdd('lancamentos', { data, historico, categoria, conta, tipo, valor });
    showToast(tipo==='entrada' ? 'Entrada registrada.' : 'Saída registrada.');
  }

  await loadAll();
  // manter o formulário pronto para o próximo lançamento, preservando data
  const dataAtual = data;
  render();
  const inp = document.querySelector('#formLancar input[name="data"]');
  if(inp) inp.value = dataAtual;
}

function getFilteredLancamentos(f){
  return state.lancamentos.filter(l=>{
    if(l.data < f.inicio || l.data > f.fim) return false;
    if(f.conta !== 'todas' && l.conta !== f.conta) return false;
    if(f.tipo !== 'todas' && l.tipo !== f.tipo) return false;
    if(f.categoria !== 'todas' && l.categoria !== f.categoria) return false;
    return true;
  }).sort((a,b)=> (a.data+String(a.id).padStart(10,'0')).localeCompare(b.data+String(b.id).padStart(10,'0')));
}

function saldoAnterior(f){
  // soma saldos iniciais das contas consideradas + movimentos anteriores ao período
  const contas = f.conta === 'todas' ? CONTAS : [f.conta];
  let saldo = contas.reduce((acc,c)=>acc + (state.config.saldosIniciais[c]||0), 0);
  for(const l of state.lancamentos){
    if(!contas.includes(l.conta)) continue;
    if(l.data < f.inicio){
      saldo += (l.tipo==='entrada' ? l.valor : -l.valor);
    }
  }
  return saldo;
}

function renderReportArea(){

  const rows = state.reportResult;

  const anterior = saldoAnterior(f);
  const atual = anterior + totalEntradas - totalSaidas;

  let html = `<div class="card">` + letterheadHTML() + `
    <h2 class="section-title">Resultado
      <small>${formatDataBR(f.inicio)} a ${formatDataBR(f.fim)} · ${f.conta==='todas'?'Todas as contas':f.conta}</small>
    </h2>`;

  if(rows.length === 0){
    html += `<div class="empty">Nenhum lançamento encontrado para esse filtro.</div></div>`;
    return html;
  }

  if(f.visao === 'detalhado'){
    html += `<div class="table-wrap"><table class="report">
      <thead><tr>
        <th>Data</th><th>Histórico</th><th>Categoria</th><th>Conta</th>
        <th class="num">Entradas</th><th class="num">Saídas</th>
      </tr></thead><tbody>
      <tr class="saldo-row"><td colspan="4">Saldo anterior</td><td class="num" colspan="2">${formatMoeda(anterior)}</td></tr>`;
    for(const r of rows){
      html += `<tr>
        <td>${formatDataBR(r.data)}</td>
        <td>${escHtml(r.historico)}</td>
        <td>${escHtml(r.categoria)}</td>
        <td>${escHtml(r.conta)}</td>
        <td class="num">${r.tipo==='entrada'?formatMoeda(r.valor):''}</td>
        <td class="num">${r.tipo==='saida'?formatMoeda(r.valor):''}</td>
      </tr>`;
    }
    html += `<tr class="total-row"><td colspan="4">Total do período</td><td class="num">${formatMoeda(totalEntradas)}</td><td class="num">${formatMoeda(totalSaidas)}</td></tr>
      <tr class="saldo-row"><td colspan="4">Saldo atual</td><td class="num" colspan="2">${formatMoeda(atual)}</td></tr>
      </tbody></table></div>`;
  } else {
    // consolidado por categoria
    const porCategoria = {};
    for(const r of rows){
      if(!porCategoria[r.categoria]) porCategoria[r.categoria] = {entrada:0, saida:0};
      porCategoria[r.categoria][r.tipo] += r.valor;
    }
    const categorias = Object.keys(porCategoria).sort((a,b)=>a.localeCompare(b,'pt-BR'));
    html += `<div class="table-wrap"><table class="report">
      <thead><tr><th>Categoria</th><th class="num">Entradas</th><th class="num">Saídas</th></tr></thead><tbody>`;
    for(const cat of categorias){
      const v = porCategoria[cat];
      html += `<tr><td>${escHtml(cat)}</td><td class="num">${v.entrada?formatMoeda(v.entrada):'—'}</td><td class="num">${v.saida?formatMoeda(v.saida):'—'}</td></tr>`;
    }
    html += `<tr class="total-row"><td>Total</td><td class="num">${formatMoeda(totalEntradas)}</td><td class="num">${formatMoeda(totalSaidas)}</td></tr>
      </tbody></table></div>
      <div class="summary-row"><span>Saldo anterior</span><span>${formatMoeda(anterior)}</span></div>
      <div class="summary-row"><span>Resultado do período</span><span>${formatMoeda(totalEntradas-totalSaidas)}</span></div>

    <button class="btn" id="btnCompartilharPDF">Compartilhar / Salvar PDF</button>

function compartilharPDF(){
  const f = state.reportFilters;
  const rows = state.reportResult;
  const anterior = saldoAnterior(f);
  const totalEntradas = rows.filter(r=>r.tipo==='entrada').reduce((a,r)=>a+r.valor,0);
  const totalSaidas = rows.filter(r=>r.tipo==='saida').reduce((a,r)=>a+r.valor,0);
  const atual = anterior + totalEntradas - totalSaidas;

  const doc = new jspdf.jsPDF();
  doc.addImage(LOGO_IGREJA_B64, 'PNG', 14, 10, 22, 22);
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.text(DADOS_IGREJA.nome, 40, 16);
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.text(DADOS_IGREJA.endereco, 40, 21);
  doc.text(`CNPJ: ${DADOS_IGREJA.cnpj}`, 40, 25);

  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.text('Boletim de Caixa', 14, 40);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.text(`Período: ${formatDataBR(f.inicio)} a ${formatDataBR(f.fim)}`, 14, 46);
  doc.text(`Conta: ${f.conta==='todas'?'Todas as contas':f.conta}`, 14, 51);

  let head, body;
  if(f.visao === 'detalhado'){
    head = [['Data','Histórico','Categoria','Conta','Entradas','Saídas']];
    body = [];
    body.push(['', 'Saldo anterior', '', '', anterior>=0?formatMoedaPDF(anterior):'', anterior<0?formatMoedaPDF(-anterior):'']);
    for(const r of rows){
      body.push([
        formatDataBR(r.data), r.historico, r.categoria, r.conta,
        r.tipo==='entrada' ? formatMoedaPDF(r.valor) : '',
        r.tipo==='saida' ? formatMoedaPDF(r.valor) : ''
      ]);
    }
    body.push(['', 'Total do período', '', '', formatMoedaPDF(totalEntradas), formatMoedaPDF(totalSaidas)]);
    body.push(['', 'Saldo atual', '', '', atual>=0?formatMoedaPDF(atual):'', atual<0?formatMoedaPDF(-atual):'']);
  } else {
    head = [['Categoria','Entradas','Saídas']];
    const porCategoria = {};
    for(const r of rows){
      if(!porCategoria[r.categoria]) porCategoria[r.categoria] = {entrada:0, saida:0};
      porCategoria[r.categoria][r.tipo] += r.valor;
    }
    body = Object.keys(porCategoria).sort((a,b)=>a.localeCompare(b,'pt-BR')).map(cat=>{
      const v = porCategoria[cat];
      return [cat, v.entrada?formatMoedaPDF(v.entrada):'—', v.saida?formatMoedaPDF(v.saida):'—'];
    });
    body.push(['Total', formatMoedaPDF(totalEntradas), formatMoedaPDF(totalSaidas)]);
    body.push(['Saldo anterior', formatMoedaPDF(anterior), '']);
    body.push(['Saldo atual', formatMoedaPDF(atual), '']);
  }

  doc.autoTable({
    head, body, startY: 56, styles:{fontSize:8}, headStyles:{fillColor:[31,71,52]}
  });

  // Linhas de assinatura
  const finalY = doc.lastAutoTable.finalY + 25;
  const pageWidth = doc.internal.pageSize.getWidth();
  const margin = 14;
  const colWidth = (pageWidth - margin*2) / ASSINATURAS.length;
  doc.setFontSize(9);
  ASSINATURAS.forEach((a, i)=>{
    const x1 = margin + i*colWidth + 8;
    const x2 = margin + (i+1)*colWidth - 8;
    const cx = (x1+x2)/2;
    doc.line(x1, finalY, x2, finalY);
    doc.text(a.nome, cx, finalY+5, {align:'center'});
    doc.text(a.cargo, cx, finalY+10, {align:'center'});
  });

  const filename = `boletim_${f.inicio}_a_${f.fim}.pdf`;

  if(navigator.canShare && navigator.share){
    const blob = doc.output('blob');
    const file = new File([blob], filename, {type:'application/pdf'});
    if(navigator.canShare({files:[file]})){
      navigator.share({
        files:[file],
        title:'Boletim de Caixa',
        text:`Boletim de Caixa - ${formatDataBR(f.inicio)} a ${formatDataBR(f.fim)}`
      }).catch(err=>{
        if(err.name !== 'AbortError') doc.save(filename);
      });
      return;
    }
  }
  doc.save(filename);
}

function exportarCSV(){
  const f = state.reportFilters;
  const rows = state.reportResult;
  const anterior = saldoAnterior(f);
  const totalEntradas = rows.filter(r=>r.tipo==='entrada').reduce((a,r)=>a+r.valor,0);
  const totalSaidas = rows.filter(r=>r.tipo==='saida').reduce((a,r)=>a+r.valor,0);
  const atual = anterior + totalEntradas - totalSaidas;

  const out = [];
  out.push([`BOLETIM DE CAIXA - ${formatDataBR(f.inicio)} a ${formatDataBR(f.fim)} - ${f.conta==='todas'?'TODAS AS CONTAS':f.conta.toUpperCase()}`]);
  out.push(['DATA','HISTÓRICO','CATEGORIA','CONTA','ENTRADAS R$','SAÍDAS R$']);
  out.push(['','Saldo Anterior','','','', '']);
  out[2][4] = ''; out[2][5] = '';
  out.push(['', 'Saldo Anterior', '', '', csvNum(anterior>=0?anterior:0), csvNum(anterior<0?-anterior:0)]);
  for(const r of rows){
    out.push([
      formatDataBR(r.data),
      r.historico,
      r.categoria,
      r.conta,
      r.tipo==='entrada' ? csvNum(r.valor) : '',
      r.tipo==='saida' ? csvNum(r.valor) : ''
    ]);
  }
  out.push(['','Total do Período','','', csvNum(totalEntradas), csvNum(totalSaidas)]);
  out.push(['','Saldo Atual','','', csvNum(atual>=0?atual:0), csvNum(atual<0?-atual:0)]);

  const csv = toCSV(out);
  downloadFile(csv, `boletim_${f.inicio}_a_${f.fim}.csv`, 'text/csv;charset=utf-8');
}

function renderCategorias(){
  const cats = [...state.categorias].sort((a,b)=>{
    if(a.tipo !== b.tipo) {
      const ordem = {entrada:0, saida:1, ambos:2};
      return ordem[a.tipo]-ordem[b.tipo];
    }
    return a.nome.localeCompare(b.nome,'pt-BR');
  });

  let html = `<div class="card">
    <h2 class="section-title">Nova categoria</h2>
    <form id="formNovaCategoria">
      <label>Nome</label>
      <input type="text" name="nome" placeholder="Ex: Manutenção de Veículo" required>
      <label>Tipo</label>
      <select name="tipo">
        <option value="entrada">Entrada</option>
        <option value="saida" selected>Saída</option>
      </select>
      <button type="submit" class="btn">Adicionar categoria</button>
    </form>
  </div>`;

  html += `<div class="card">
    <h2 class="section-title">Categorias cadastradas <small>${cats.length} no total</small></h2>`;
  for(const c of cats){
    const tagLabel = c.tipo==='entrada'?'Entrada':(c.tipo==='saida'?'Saída':'Transferência');
    const podeEditar = c.nome !== CAT_TRANSFER;
    html += `<div class="category-row">
      <span class="name">${escHtml(c.nome)}</span>
      <span class="tag ${c.tipo}">${tagLabel}</span>
      ${podeEditar ? `<button class="icon-btn" data-action="editar-categoria" data-id="${c.id}" title="Editar">✏️</button>
      <button class="icon-btn" data-action="excluir-categoria" data-id="${c.id}" title="Excluir">🗑️</button>` : ''}
    </div>`;
  }
  html += `</div>`;
  return html;
}

function openModal(html){
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">${html}</div>
    </div>`;
  document.getElementById('modalOverlay').addEventListener('click', (e)=>{
    if(e.target.id === 'modalOverlay') closeModal();
  });
}
function closeModal(){
  document.getElementById('modalRoot').innerHTML = '';
}

function abrirModalEditarLancamento(id){
  const l = state.lancamentos.find(x=>x.id===id);
  if(!l) return;

  if(l.transferGroup){
    openModal(`
      <h3>Transferência</h3>
      <p class="note">${escHtml(l.historico)}<br>
      ${formatDataBR(l.data)} · ${escHtml(l.conta)} · ${l.tipo==='saida'?'Saída':'Entrada'} de ${formatMoeda(l.valor)}</p>
      <p class="note">Este lançamento faz parte de uma transferência entre contas. Para corrigi-lo, exclua a transferência (as duas pontas serão removidas) e lance novamente.</p>
      <div class="btn-row">
        <button class="btn ghost" id="btnFecharModal">Fechar</button>
        <button class="btn danger" id="btnExcluirTransfer" data-grupo="${l.transferGroup}">Excluir transferência</button>
      </div>
    `);
    document.getElementById('btnFecharModal').addEventListener('click', closeModal);
    document.getElementById('btnExcluirTransfer').addEventListener('click', async ()=>{
      if(!confirm('Excluir esta transferência (as duas pontas)?')) return;
      const pares = state.lancamentos.filter(x=>x.transferGroup===l.transferGroup);
      for(const p of pares) await dbDelete('lancamentos', p.id);
      await loadAll();
      closeModal();
      render();
      showToast('Transferência excluída.');
    });
    return;
  }

  const cats = categoriasParaTipo(l.tipo);
  openModal(`
    <h3>Editar lançamento</h3>
    <form id="formEditarLancamento">
      <label>Data</label>
      <input type="date" name="data" value="${l.data}" required>

      <label>Histórico</label>
      <input type="text" name="historico" value="${escHtml(l.historico)}" required>

      <label>Tipo</label>
      <div class="segmented">
        <button type="button" data-edit-tipo="entrada" class="${l.tipo==='entrada'?'active':''}">Entrada</button>
        <button type="button" data-edit-tipo="saida" class="${l.tipo==='saida'?'active':''}">Saída</button>
      </div>

      <label>Categoria</label>
      <select name="categoria" id="editCategoria" required>
        ${cats.map(c=>`<option value="${escHtml(c.nome)}" ${c.nome===l.categoria?'selected':''}>${escHtml(c.nome)}</option>`).join('')}
      </select>

      <label>Conta corrente</label>
      <select name="conta" required>
        ${CONTAS.map(c=>`<option value="${c}" ${c===l.conta?'selected':''}>${c}</option>`).join('')}
      </select>

      <label>Valor (R$)</label>
      <input type="text" inputmode="decimal" name="valor" value="${l.valor.toFixed(2).replace('.',',')}" required>

      <div class="btn-row">
        <button type="button" class="btn danger" id="btnExcluirLancamento">Excluir</button>
        <button type="submit" class="btn">Salvar</button>
      </div>
    </form>
  `);

  let tipoAtual = l.tipo;
  document.querySelectorAll('[data-edit-tipo]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      tipoAtual = btn.dataset.editTipo;
      document.querySelectorAll('[data-edit-tipo]').forEach(b=>b.classList.toggle('active', b===btn));
      const sel = document.getElementById('editCategoria');
      const novasCats = categoriasParaTipo(tipoAtual);
      sel.innerHTML = novasCats.map(c=>`<option value="${escHtml(c.nome)}">${escHtml(c.nome)}</option>`).join('');
    });
  });

  document.getElementById('btnExcluirLancamento').addEventListener('click', async ()=>{
    if(!confirm('Excluir este lançamento?')) return;
    await dbDelete('lancamentos', l.id);
    await loadAll();
    closeModal();
    render();
    showToast('Lançamento excluído.');
  });

  document.getElementById('formEditarLancamento').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const form = e.target;
    const valor = parseValor(form.valor.value);
    if(valor <= 0){ showToast('Informe um valor maior que zero.'); return; }
    await dbPut('lancamentos', {
      id: l.id,
      data: form.data.value,
      historico: form.historico.value.trim(),
      categoria: form.categoria.value,
      conta: form.conta.value,
      tipo: tipoAtual,
      valor
    });
    await loadAll();
    closeModal();
    render();
    showToast('Lançamento atualizado.');
  });
}

function abrirModalConfirmarParcela(parcelaId){
  const p = state.parcelas.find(x=>x.id===parcelaId);
  const c = p ? state.compromissos.find(x=>x.id===p.compromissoId) : null;
  if(!p || !c) return;

  const labelParcela = p.numeroParcela ? ` (${p.numeroParcela}/${p.totalParcelas})` : '';
  const cats = categoriasParaTipo('saida');

  openModal(`
    <h3>Confirmar pagamento</h3>
    <p class="note">${escHtml(c.descricao)}${labelParcela} · vencimento ${formatDataBR(p.dataVencimento)}${c.valorVariavel ? ' · valor pode variar, ajuste abaixo' : ''}</p>
    <form id="formConfirmarParcela">
      <label>Data do pagamento</label>
      <input type="date" name="data" value="${todayISO()}" required>

      <label>Histórico</label>
      <input type="text" name="historico" value="${escHtml(c.descricao)}${labelParcela}" required>

      <label>Categoria</label>
      <select name="categoria" required>
        ${cats.map(cat=>`<option value="${escHtml(cat.nome)}" ${cat.nome===c.categoria?'selected':''}>${escHtml(cat.nome)}</option>`).join('')}
      </select>

      <label>Conta corrente</label>
      <select name="conta" required>
        ${CONTAS.map(cc=>`<option value="${cc}" ${cc===c.conta?'selected':''}>${cc}</option>`).join('')}
      </select>

      <label>Valor pago (R$)</label>
      <input type="text" inputmode="decimal" name="valor" value="${p.valorPrevisto.toFixed(2).replace('.',',')}" required>

      <div class="btn-row">
        <button type="button" class="btn ghost" id="btnCancelarConfirmacao">Voltar</button>
        <button type="submit" class="btn">Confirmar pagamento</button>
      </div>
    </form>
    <button class="btn danger" style="margin-top:10px;" id="btnNaoSeAplica">Esta parcela não se aplica (cancelar)</button>
  `);

  document.getElementById('btnCancelarConfirmacao').addEventListener('click', closeModal);

  document.getElementById('btnNaoSeAplica').addEventListener('click', async ()=>{
    if(!confirm('Marcar esta parcela como cancelada? Ela vai sumir das pendências sem gerar lançamento.')) return;
    await dbPut('parcelas', {...p, status:'cancelado'});
    await loadAll();
    closeModal();
    render();
    showToast('Parcela cancelada.');
  });

  document.getElementById('formConfirmarParcela').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const form = e.target;
    const valor = parseValor(form.valor.value);
    if(valor <= 0){ showToast('Informe um valor maior que zero.'); return; }

    const novoId = await dbAdd('lancamentos', {
      data: form.data.value,
      historico: form.historico.value.trim(),
      categoria: form.categoria.value,
      conta: form.conta.value,
      tipo: 'saida',
      valor
    });
    await dbPut('parcelas', { ...p, status:'pago', lancamentoId: novoId, valorPago: valor });
    await loadAll();
    closeModal();
    render();
    showToast('Pagamento registrado.');
  });
}

  openModal(`
    <h3>Editar categoria</h3>
    <form id="formEditarCategoria">
      <label>Nome</label>
      <input type="text" name="nome" value="${escHtml(c.nome)}" required>

      </select>
      <div class="btn-row">
        <button type="button" class="btn ghost" id="btnCancelarCategoria">Cancelar</button>
        <button type="submit" class="btn">Salvar</button>
      </div>
    </form>
  `);
  document.getElementById('btnCancelarCategoria').addEventListener('click', closeModal);
  document.getElementById('formEditarCategoria').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const form = e.target;
    const novoNome = form.nome.value.trim();
    if(!novoNome){ showToast('Informe um nome.'); return; }
    const nomeAntigo = c.nome;
    await dbPut('categorias', {id:c.id, nome:novoNome, tipo:form.tipo.value});
    // atualiza lançamentos existentes com o nome antigo
    if(nomeAntigo !== novoNome){
      const afetados = state.lancamentos.filter(l=>l.categoria===nomeAntigo);
      for(const l of afetados){
        l.categoria = novoNome;
        await dbPut('lancamentos', l);
      }
    }
    await loadAll();
    closeModal();
    render();
    showToast('Categoria atualizada.');
  });
}

/* ============================================================
   SPLASH DE NOTIFICAÇÃO — abre ao entrar no app
============================================================ */
function calcularSplashPendencias(){
  const hoje = todayISO();
  const horizonte = addDaysISO(hoje, 2);
  return state.parcelas
    .filter(p => p.status === 'pendente' && p.dataVencimento <= horizonte)
    .map(p => ({
      ...p,
      compromisso: state.compromissos.find(c => c.id === p.compromissoId)
    }))
    .filter(p => p.compromisso)
    .sort((a,b) => a.dataVencimento.localeCompare(b.dataVencimento));
}

function abrirSplashPendencias(){
  const hoje = todayISO();
  const amanha = addDaysISO(hoje, 1);
  const horizonte = addDaysISO(hoje, 2);
  const urgentes = calcularSplashPendencias();
  if(urgentes.length === 0) return;

  const atrasados = urgentes.filter(p => p.dataVencimento < hoje);
  const hojeItens  = urgentes.filter(p => p.dataVencimento === hoje);
  const emBreve    = urgentes.filter(p => p.dataVencimento > hoje && p.dataVencimento <= horizonte);

  let body = '';
  if(atrasados.length){
    body += `<div class="splash-section-label">⚠️ Atrasados — ${atrasados.length} item(ns)</div>`;
    for(const p of atrasados) body += splashItemHTML(p, 'atrasado');
  }
  if(hojeItens.length){
    body += `<div class="splash-section-label">🔴 Vencem hoje — ${hojeItens.length} item(ns)</div>`;
    for(const p of hojeItens) body += splashItemHTML(p, 'hoje');
  }
  if(emBreve.length){
    body += `<div class="splash-section-label">🟡 Vencem em breve — ${emBreve.length} item(ns)</div>`;
    for(const p of emBreve) body += splashItemHTML(p, 'embreve');
  }

  document.getElementById('splashRoot').innerHTML = `
    <div class="splash-overlay" id="splashOverlay">
      <div class="splash">
        <div class="splash-header">
          <h2>Avisos do dia</h2>
          <p>${urgentes.length} pendência(s) requer(em) atenção</p>
        </div>
        <div class="splash-body">${body}</div>
        <div class="splash-footer">
          <button class="btn" id="btnFecharSplash">Ver tudo na tela Início</button>
        </div>
      </div>
    </div>`;

  document.getElementById('btnFecharSplash').addEventListener('click', fecharSplash);

  document.querySelectorAll('[data-splash-parcela]').forEach(el => {
    el.addEventListener('click', () => {
      fecharSplash();
      abrirModalConfirmarParcela(Number(el.dataset.splashParcela));
    });
  });
}

function splashItemHTML(p, situacao){
  const c = p.compromisso;
  const labelParcela = p.numeroParcela ? ` (${p.numeroParcela}/${p.totalParcelas})` : '';
  const hoje = todayISO();
  let meta;
  if(situacao === 'atrasado'){
    const dias = Math.round((new Date(hoje) - new Date(p.dataVencimento)) / 86400000);
    meta = `${dias} dia(s) em atraso · venceu ${formatDataBR(p.dataVencimento)}`;
  } else if(situacao === 'hoje'){
    meta = `Vence hoje · ${escHtml(c.conta)}`;
  } else {
    const dias = Math.round((new Date(p.dataVencimento) - new Date(hoje)) / 86400000);
    meta = `Vence em ${dias} dia(s) · ${formatDataBR(p.dataVencimento)}`;
  }
  return `<div class="splash-item ${situacao}" data-splash-parcela="${p.id}">
    <div class="info">
      <div class="si-desc">${escHtml(c.descricao)}${labelParcela}</div>
      <div class="si-meta">${meta} · ${escHtml(c.categoria)}</div>
    </div>
    <div class="si-valor">${formatMoeda(p.valorPrevisto)}</div>
  </div>`;
}

function fecharSplash(){
  document.getElementById('splashRoot').innerHTML = '';
}

function afterRender(){

  // navegação
  document.querySelectorAll('nav.bottomnav button').forEach(b=>{
    b.onclick = ()=>setTab(b.dataset.tab);
  });

  // ==================================================
  // INÍCIO
  // ==================================================
  if(state.tab === 'inicio'){

    document.querySelectorAll('[data-action="editar-lancamento"]').forEach(el=>{
      el.addEventListener('click', ()=>{
        abrirModalEditarLancamento(Number(el.dataset.id));
      });
    });

    document.querySelectorAll('[data-action="confirmar-parcela"]').forEach(el=>{
      el.addEventListener('click', ()=>{
        abrirModalConfirmarParcela(Number(el.dataset.id));
      });
    });

    const formBusca = document.getElementById('formBusca');

    if(formBusca){
      formBusca.addEventListener('submit', (e)=>{
        e.preventDefault();

        const fd = new FormData(formBusca);

        state.buscaLancamentos = {
          q: fd.get('q').trim(),
          de: fd.get('de'),
          ate: fd.get('ate')
        };

        render();
      });
    }

    const btnLimpar = document.getElementById('btnLimparBusca');

    if(btnLimpar){
      btnLimpar.addEventListener('click', ()=>{
        state.buscaLancamentos = {
          q:'',
          de:'',
          ate:''
        };

        render();
      });
    }
  }

  // ==================================================
  // COMPROMISSOS - NAVEGAÇÃO EM PILHA
  // ==================================================
  if(state.tab === 'compromissos'){

    const btnNovoCompromisso =
      document.getElementById('btnNovoCompromisso');

    if(btnNovoCompromisso){
      btnNovoCompromisso.addEventListener('click', ()=>{

        state.compromissosStack = 'novo';

        render();
      });
    }

    const btnVoltarCompromisso =
      document.getElementById('btnVoltarCompromisso');

    if(btnVoltarCompromisso){
      btnVoltarCompromisso.addEventListener('click', ()=>{

        state.compromissosStack = 'lista';

        render();
      });
    }

  }

}

  if(state.tab === 'lancar'){
    document.querySelectorAll('[data-lancar-tipo]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.lancarTipo = btn.dataset.lancarTipo;
        render();
      });
    });
    const form = document.getElementById('formLancar');
    if(form){
      form.addEventListener('submit', (e)=>{
        e.preventDefault();
        handleSalvarLancamento(form);
      });
    }
  }

  if(state.tab === 'relatorios'){
    document.querySelectorAll('[data-visao]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const f = state.reportFilters || defaultFilters();
        f.visao = btn.dataset.visao;
        state.reportFilters = f;
        document.querySelectorAll('[data-visao]').forEach(b=>b.classList.toggle('active', b===btn));
        if(state.reportResult) gerarRelatorio(f);
      });
    });
    const form = document.getElementById('formFiltros');
    form.addEventListener('submit', (e)=>{
      e.preventDefault();
      const fd = new FormData(form);
      const f = state.reportFilters || defaultFilters();
      f.inicio = fd.get('inicio');
      f.fim = fd.get('fim');
      f.conta = fd.get('conta');
      f.tipo = fd.get('tipo');
      f.categoria = fd.get('categoria');
      if(!f.inicio || !f.fim || f.inicio > f.fim){
        showToast('Verifique o período informado.');
        return;
      }
      gerarRelatorio(f);
    });
    if(state.reportResult) gerarRelatorio(state.reportFilters);
  }

  if(state.tab === 'categorias'){
    document.getElementById('formNovaCategoria').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const form = e.target;
      const nome = form.nome.value.trim();
      if(!nome){ showToast('Informe um nome.'); return; }
      if(state.categorias.some(c=>c.nome.toLowerCase()===nome.toLowerCase())){
        showToast('Já existe uma categoria com esse nome.');
        return;
      }
      await dbAdd('categorias', {nome, tipo: form.tipo.value});
      await loadAll();
      render();
      showToast('Categoria adicionada.');
    });
    document.querySelectorAll('[data-action="editar-categoria"]').forEach(el=>{
      el.addEventListener('click', ()=>abrirModalEditarCategoria(Number(el.dataset.id)));
    });
    document.querySelectorAll('[data-action="excluir-categoria"]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const id = Number(el.dataset.id);
        const c = state.categorias.find(x=>x.id===id);
        const usos = state.lancamentos.filter(l=>l.categoria===c.nome).length;
        let msg = `Excluir a categoria "${c.nome}"?`;
        if(usos>0) msg += `\n\nAtenção: existem ${usos} lançamento(s) usando essa categoria. Eles continuarão existindo, mas com uma categoria não cadastrada.`;
        if(!confirm(msg)) return;
        await dbDelete('categorias', id);
        await loadAll();
        render();
        showToast('Categoria excluída.');
      });
    });
  }

  if(state.tab === 'compromissos'){
    document.querySelectorAll('[data-compromisso-tipo]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.compromissoTipo = btn.dataset.compromissoTipo;
        render();
      });
    });
    document.getElementById('formCompromisso').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const form = e.target;
      const tipo = state.compromissoTipo || 'parcelado';
      const valor = parseValor(form.valor.value);
      if(valor <= 0){ showToast('Informe um valor maior que zero.'); return; }

      const compromisso = {
        descricao: form.descricao.value.trim(),
        tipo,
        categoria: form.categoria.value,
        conta: form.conta.value,
        valorPrevisto: valor,
        valorVariavel: form.valorVariavel.checked,
        ativo: true
      };
      if(tipo === 'parcelado'){
        compromisso.dataInicio = form.dataInicio.value;
        compromisso.numParcelas = parseInt(form.numParcelas.value, 10);
        if(!compromisso.dataInicio || !compromisso.numParcelas || compromisso.numParcelas < 2){
          showToast('Informe a data da 1ª parcela e o número de parcelas (mínimo 2).');
          return;
        }
      } else if(tipo === 'recorrente'){
        compromisso.diaVencimento = parseInt(form.diaVencimento.value, 10);
        if(!compromisso.diaVencimento || compromisso.diaVencimento<1 || compromisso.diaVencimento>31){
          showToast('Informe um dia de vencimento entre 1 e 31.');
          return;
        }
      } else {
        compromisso.dataInicio = form.dataInicio.value;
        if(!compromisso.dataInicio){
          showToast('Informe a data de vencimento.');
          return;
        }
      }

      const novoId = await dbAdd('compromissos', compromisso);
      const parcelas = gerarParcelasIniciais(compromisso, novoId);
      for(const p of parcelas){
        await dbAdd('parcelas', p);
      }
      await loadAll();
      render();
      showToast('Compromisso cadastrado.');
    });

    document.querySelectorAll('[data-action="inativar-compromisso"]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const id = Number(el.dataset.id);
        if(!confirm('Inativar este compromisso? As parcelas pendentes serão canceladas e ele deixa de aparecer nas pendências.')) return;
        const c = state.compromissos.find(x=>x.id===id);
        await dbPut('compromissos', {...c, ativo:false});
        const pendentes = state.parcelas.filter(p=>p.compromissoId===id && p.status==='pendente');
        for(const p of pendentes){
          await dbPut('parcelas', {...p, status:'cancelado'});
        }
        await loadAll();
        render();
        showToast('Compromisso inativado.');
      });
    });
    document.querySelectorAll('[data-action="ativar-compromisso"]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const id = Number(el.dataset.id);
        const c = state.compromissos.find(x=>x.id===id);
        await dbPut('compromissos', {...c, ativo:true});
        await loadAll();
        if(c.tipo === 'recorrente') await garantirParcelasFuturas();
        render();
        showToast('Compromisso reativado.');
      });
    });
    document.querySelectorAll('[data-action="excluir-compromisso"]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const id = Number(el.dataset.id);
        if(!confirm('Excluir este compromisso e todas as suas parcelas? Lançamentos já registrados não serão apagados.')) return;
        await dbDelete('compromissos', id);
        await loadAll();
        render();
        showToast('Compromisso excluído.');
      });
    });
  }

  if(state.tab === 'config'){
    document.getElementById('formSaldos').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const form = e.target;
      const saldos = {};
      for(const c of CONTAS) saldos[c] = parseValor(form[`saldo_${c}`].value);
      const dataBase = form.dataBase.value;
      await dbPut('config', {key:'saldosIniciais', saldos, dataBase});
      await loadAll();
      render();
      showToast('Saldos atualizados.');
    });

    document.getElementById('btnBackup').addEventListener('click', async ()=>{
      const backup = {
        versao: 1,
        exportadoEm: new Date().toISOString(),
        lancamentos: await dbGetAll('lancamentos'),
        categorias: await dbGetAll('categorias'),
        config: await dbGetAll('config'),
      };
      downloadFile(JSON.stringify(backup, null, 2), `backup_financas_igreja_${todayISO()}.json`, 'application/json');
      showToast('Backup exportado.');
    });

    document.getElementById('inputRestaurar').addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      if(!confirm('Restaurar este backup irá substituir TODOS os dados atuais. Continuar?')) {
        e.target.value = '';
        return;
      }
      try{
        const text = await file.text();
        const backup = JSON.parse(text);
        await dbClear('lancamentos');
        await dbClear('categorias');
        await dbClear('config');
        for(const l of (backup.lancamentos||[])){ await dbAdd('lancamentos', l); }
        for(const c of (backup.categorias||[])){ await dbAdd('categorias', c); }
        for(const cfg of (backup.config||[])){ await dbPut('config', cfg); }
        await loadAll();
        render();
        showToast('Backup restaurado com sucesso.');
      }catch(err){
        showToast('Arquivo de backup inválido.');
      }
      e.target.value = '';
    });

    document.getElementById('btnSair').addEventListener('click', async ()=>{
      if(!confirm('Sair da sua conta?')) return;
      await sbClient.auth.signOut();
      state.session = null;
      state.lancamentos = [];
      state.categorias = [];
      state.reportResult = null;
      state.tab = 'inicio';
      render();
    });

    document.getElementById('btnLimpar').addEventListener('click', async ()=>{
      if(!confirm('Isso vai apagar TODOS os lançamentos, categorias e configurações da igreja (banco de dados na nuvem). Tem certeza?')) return;
      if(!confirm('Confirma novamente: apagar tudo permanentemente?')) return;
      await dbClear('lancamentos');
      await dbClear('categorias');
      await dbClear('config');
      await seedIfEmpty();
      await loadAll();
      state.reportResult = null;
      setTab('inicio');
      showToast('Todos os dados foram apagados.');
    });
  }
}

/* ============================================================
   INICIALIZAÇÃO
============================================================ */
(async function init(){
  const { data } = await sbClient.auth.getSession();
  state.session = data.session;

  sbClient.auth.onAuthStateChange((event, session)=>{
    state.session = session;
    if(!session){
      state.tab = 'inicio';
      render();
    }
  });

  if(state.session){
    await seedIfEmpty();
    await loadAll();
    await garantirParcelasFuturas();
    render();
    // Abre o aviso do dia logo após carregar, se houver pendências urgentes
    setTimeout(abrirSplashPendencias, 300);
  } else {
    render();
  }
})();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(err=>console.error('SW falhou:', err));
  });
}
</script>
